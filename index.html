<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Tree Builder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="header-actions">
        <h2 data-i18n="ui-title">Branch Editor</h2>
        <div style="display: flex; gap: 8px;">
          <button id="btnToggleLang" class="btn-theme" title="Switch Language">🇺🇦 UK</button>
          <button id="btnToggleTheme" class="btn-theme" title="Toggle Dark/Light Mode">🌙</button>
        </div>
      </div>
      
      <div class="form-group">
        <div id="targetIndicator" class="target-indicator" data-i18n="ui-target-main">📍 Target: <strong>Main Tree</strong></div>
        <button id="btnResetTarget" class="btn-reset" style="display: none;" data-i18n="ui-btn-reset">Reset Target</button>
      </div>

      <input type="hidden" id="targetParentId" value="">
      <input type="hidden" id="editNodeId" value="">

      <div class="form-group">
        <label for="nodeName" data-i18n="ui-label-name">Name:</label>
        <input type="text" id="nodeName" data-i18n="ui-ph-name" placeholder="Enter name..." autocomplete="off">
      </div>

      <div class="form-group">
        <label for="nodeDesc" data-i18n="ui-label-desc">Description (optional):</label>
        <textarea id="nodeDesc" rows="3" data-i18n="ui-ph-desc" placeholder="Add details..."></textarea>
      </div>

      <div class="form-group color-group">
        <div class="color-picker-wrapper">
          <label for="nodeBorderColor" data-i18n="ui-label-border">Border Color:</label>
          <input type="color" id="nodeBorderColor" value="#1a73e8">
        </div>
        <div class="color-picker-wrapper">
          <label for="nodeTextColor" data-i18n="ui-label-text">Title Text Color:</label>
          <input type="color" id="nodeTextColor" value="#1a73e8">
        </div>
      </div>
      
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="syncColors" checked>
          <span data-i18n="ui-label-sync">🔗 Sync text color with border</span>
        </label>
      </div>

      <button id="btnAddNode" class="btn-primary" data-i18n="ui-btn-add">Add Branch</button>
      <button id="btnCancelEdit" class="btn-reset" style="display: none; width: 100%; margin-top: 5px;" data-i18n="ui-btn-cancel">Cancel Editing</button>

      <hr>

      <div class="form-group">
        <label for="searchInput" data-i18n="ui-label-search">Search:</label>
        <input type="text" id="searchInput" data-i18n="ui-ph-search" placeholder="Search by name or description...">
      </div>

      <button id="btnSaveJson" class="btn-success" data-i18n="ui-btn-save">💾 Save JSON</button>
      <input type="file" id="inputFile" accept=".json" style="display: none;">
      <button id="btnLoadJson" class="btn-warning" style="margin-top: 10px;" data-i18n="ui-btn-load">📂 Load JSON</button>
    </aside>

    <main class="tree-container">
      <ul id="treeRoot"></ul>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
